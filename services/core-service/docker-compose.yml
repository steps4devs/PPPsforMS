name: core-prod

services:
  mysql-core:
    image: mysql:8.4
    container_name: core-prod-mysql-core-1
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${CORE_DB_PASSWORD}
      MYSQL_DATABASE: ${CORE_DB_NAME}
    ports:
      - "3396:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p${CORE_DB_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - core-int
    volumes:
      - core-prod_mysql_core_prod_data:/var/lib/mysql

  core-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: core-prod-core-service-1
    restart: unless-stopped
    depends_on:
      mysql-core:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
      CORE_DB_HOST: mysql-core
      CORE_DB_NAME: ${CORE_DB_NAME}
      CORE_DB_USERNAME: ${CORE_DB_USERNAME}
      CORE_DB_PASSWORD: ${CORE_DB_PASSWORD}
    ports:
      - "8086:8086"
    networks:
      - core-int
      - ms-net

networks:
  core-int:
    name: core-int
  ms-net:
    external: true

volumes:
  core-prod_mysql_core_prod_data:
    name: core-prod_mysql_core_prod_data
